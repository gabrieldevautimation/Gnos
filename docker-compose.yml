# ─── Gnos — Docker Compose (Ambiente de Desenvolvimento Local) ────────────────
# Roda: docker compose up -d
# Para: docker compose down
# Reset completo: docker compose down -v

name: gnos-dev

services:
  # ─── PostgreSQL (Supabase local via Prisma) ──────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: gnos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gnos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── N8N (Automações) ─────────────────────────────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: gnos-n8n
    restart: unless-stopped
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=gnos-secret
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=America/Sao_Paulo
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=postgres
      - DB_POSTGRESDB_PASSWORD=postgres
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      - ./tools/n8n/workflows:/home/node/.n8n/workflows
    depends_on:
      postgres:
        condition: service_healthy

  # ─── Redis (Fase 2 — já deixa preparado) ──────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: gnos-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── API (Fastify — desenvolvimento) ──────────────────────────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.dev
    container_name: gnos-api
    restart: unless-stopped
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/gnos
      - DIRECT_URL=postgresql://postgres:postgres@postgres:5432/gnos
      - REDIS_URL=redis://redis:6379
      - N8N_WEBHOOK_URL=http://n8n:5678/webhook/gnos-events
      - PORT=3001
    ports:
      - "3001:3001"
    volumes:
      - ./apps/api/src:/app/src  # hot reload
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  n8n_data:
  redis_data:
